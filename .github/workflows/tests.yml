name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: symfony

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, zip, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: symfony/vendor
          key: composer-${{ hashFiles('symfony/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run tests
        run: php vendor/bin/phpunit tests/Service/TraceRegexTest.php --colors=always
