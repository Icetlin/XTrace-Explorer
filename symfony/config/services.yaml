# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    traces_dir: '%kernel.project_dir%/var/traces'
    traces_source_dir: '%env(default::TRACES_SOURCE_DIR)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\TraceParser:
        arguments:
            $tracesDir: '%traces_dir%'

    App\Service\TraceIndex:
        arguments:
            $tracesDir: '%traces_dir%'

    App\Service\SummaryBuilder:
        arguments:
            $tracesDir: '%traces_dir%'

    App\MessageHandler\ParseTraceHandler:
        arguments:
            $tracesDir: '%traces_dir%'

    App\MessageHandler\ScanFavouritesHandler:
        arguments:
            $tracesDir: '%traces_dir%'

    App\Controller\TraceController:
        arguments:
            $tracesDir: '%traces_dir%'
            $tracesSourceDir: '%traces_source_dir%'

    # ── Profiler+ : all config comes from env vars (PROFILER_*) ──
    # ProfilerConfig is read once from env when the container compiles and
    # reused for the lifetime of the worker. The UI is read-only — to change
    # a setting, edit docker-compose / .env and restart the app container.
    App\Service\Profiler\ProfilerConfig:
        factory: ['@App\Service\Profiler\ProfilerConfigFactory', 'create']

    App\Service\Profiler\ProfilerHttpClient:
        arguments:
            $config: '@App\Service\Profiler\ProfilerConfig'

    App\Service\Profiler\DbPanelParser:
        arguments:
            $config: '@App\Service\Profiler\ProfilerConfig'

    App\Service\Profiler\DbAnalyzer:
        arguments:
            $config: '@App\Service\Profiler\ProfilerConfig'

    App\Service\Profiler\ProfilerClient:
        arguments:
            $config: '@App\Service\Profiler\ProfilerConfig'
            $http: '@App\Service\Profiler\ProfilerHttpClient'
            $parser: '@App\Service\Profiler\DbPanelParser'
            $analyzer: '@App\Service\Profiler\DbAnalyzer'
